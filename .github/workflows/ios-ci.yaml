name: iOS CI Pipeline

on:
  push:
    branches: [ master ]
    paths:
      - 'iOS/**'
  pull_request:
    branches: [ master ]
    paths:
      - 'iOS/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4

      - name: "Cache Homebrew"
        id: cache-homebrew
        uses: actions/cache@v4
        with:
          path: /usr/local/Homebrew
          key: ${{ runner.os }}-homebrew-
          restore-keys: |
            ${{ runner.os }}-homebrew-

      - name: "Cache Xcode DerivedData"
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-xcode-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-xcode-

      - name: "Select Xcode"
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: "Install dependencies"
        run: |
          brew install xcodegen swiftgen python rustup just
          pip install pyyaml

      - name: "Setup Rust"
        run: rustup install stable && rustup default stable

      - name: "Generate Xcode project and Strings"
        run: just start-ios-dev

      - name: "Build app"
        run: |
          xcodebuild \
           -project iOS/PadawanWallet.xcodeproj \
           -scheme PadawanWallet \
           -sdk iphonesimulator \
           -destination 'platform=iOS Simulator,name=iPhone 17,OS=latest' \
           CODE_SIGNING_ALLOWED=NO \
           CODE_SIGN_IDENTITY="" \
           build
